<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de CPF Profissional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>Gerador de CPF</h1>
        <p>Clique no botão para gerar um número válido.</p>
        
        <div class="input-group">
            <input type="text" id="cpfDisplay" readonly placeholder="000.000.000-00">
        </div>

        <button id="generateBtn">Gerar Novo CPF</button>
        <div id="copyMessage" class="message">Copiado para a área de transferência!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
